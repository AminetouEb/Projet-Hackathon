services:

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: environmental_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

    ports:
      - "5432:5432"

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/data:/data


  backend:
    build: ./backend
    container_name: backend_api
    restart: always

    ports:
      - "5000:5000"

    depends_on:
      - db

    environment:
      DB_HOST: db
      DB_NAME: environmental_db
      DB_USER: postgres
      DB_PASSWORD: 1234
      DB_PORT: 5432


  frontend:
    build: ./frontend
    container_name: frontend_app
    restart: always

    ports:
      - "4200:4200"

    depends_on:
      - backend

    command: ["npx", "ng", "serve", "--host", "0.0.0.0", "--port", "4200", "--poll", "2000"]

    # Code source depuis l’hôte : plus besoin de rebuild à chaque edit (node_modules restent dans l’image).
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/angular.json:/app/angular.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json